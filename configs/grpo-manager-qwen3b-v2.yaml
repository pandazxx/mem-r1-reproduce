# M4 v2: Memory Manager rerun with corrected reward semantics (issue #17).
# Changes vs grpo-manager-qwen3b.yaml:
#   context_cap: 60  — ADDs displace the weakest retrieved memories instead of
#                      getting free extra context slots (matches real top-60 RAG)
#   add_penalty: 0.01 — small bank-growth cost per ADD, pushing toward
#                       UPDATE/NOOP where they answer equally well
#   num_train_epochs: 1 — v1 entropy-collapsed early; extra epochs bought nothing

model: Qwen/Qwen2.5-3B-Instruct
episodes: artifacts/episodes/train.jsonl
reward_metric: f1
answer_max_new_tokens: 256
context_cap: 60
add_penalty: 0.01

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  task_type: CAUSAL_LM
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

grpo:
  output_dir: outputs/grpo-manager-qwen3b-v2
  num_train_epochs: 1
  learning_rate: 1.0e-5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  num_generations: 8
  generation_batch_size: 8
  max_completion_length: 256
  temperature: 0.9
  beta: 0.04
  bf16: true
  gradient_checkpointing: true
  logging_steps: 1
  save_strategy: steps
  save_steps: 25
  save_total_limit: 2
  report_to: none
